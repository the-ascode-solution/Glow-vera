{% extends 'admin_base.html' %}

{% block title %}{{ 'Edit' if review else 'Add' }} Review - Glowvera Naturals{% endblock %}

{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="admin-title">{{ 'Edit' if review else 'Add' }} Review</h1>
    <a href="{{ url_for('admin_reviews') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back to Reviews
    </a>
</div>

<div class="table-card">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row">
            <div class="col-md-8">
                <div class="mb-3">
                    <label for="reviewer_name" class="form-label">Reviewer Name *</label>
                    <input type="text" class="form-control" id="reviewer_name" name="reviewer_name" 
                           value="{{ review.reviewer_name if review else '' }}" required>
                </div>

                <div class="mb-3">
                    <label for="review_date" class="form-label">Review Date *</label>
                    <input type="datetime-local" class="form-control" id="review_date" name="review_date" 
                           value="{{ review.review_date.strftime('%Y-%m-%dT%H:%M') if review else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Rating *</label>
                    <div>
                        {% for i in range(1, 6) %}
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="rating" id="rating_{{ i }}" 
                                   value="{{ i }}" {% if review and review.rating == i %}checked{% elif not review and i == 5 %}checked{% endif %} required>
                            <label class="form-check-label" for="rating_{{ i }}">
                                {{ i }} Star{{ 's' if i > 1 else '' }}
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="mb-3">
                    <label for="product_id" class="form-label">Product (Optional)</label>
                    <select class="form-select" id="product_id" name="product_id">
                        <option value="">General (not linked to a product)</option>
                        {% for product in products %}
                        <option value="{{ product.id }}" {% if review and review.product_id == product.id %}selected{% endif %}>
                            {{ product.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="review_text" class="form-label">Review Text *</label>
                    <textarea class="form-control" id="review_text" name="review_text" rows="5" required>{{ review.review_text if review else '' }}</textarea>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="is_visible" name="is_visible" 
                           {% if review is none or review.is_visible %}checked{% endif %}>
                    <label class="form-check-label" for="is_visible">
                        <i class="fas fa-eye me-1"></i> Visible on website
                    </label>
                </div>
            </div>
        </div>

        <div class="d-flex gap-3 mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-2"></i>{{ 'Update' if review else 'Add' }} Review
            </button>
            <a href="{{ url_for('admin_reviews') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

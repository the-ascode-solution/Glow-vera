name: Deploy Glow-Vera to SymbolHost

on:
  push:
    branches: [ main ]

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 🔨 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🚚 Deploy to Server (SCP)
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: "app.py,requirements.txt,static,templates,migrations,passenger_wsgi.py"
        target: "~/apps/glowveranaturals"
        rm: false

    - name: 🛠️ Post-deployment Commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd ~/apps/glowveranaturals
          # Update .env from secrets
          echo "${{ secrets.PROD_ENV }}" > .env
          
          # Install/Update dependencies in virtualenv
          # We'll try to find the virtualenv based on cPanel's standard structure
          # Usually: ~/virtualenv/apps/glowveranaturals/3.11/bin/activate
          if [ -d "~/virtualenv/apps/glowveranaturals/3.11" ]; then
            source ~/virtualenv/apps/glowveranaturals/3.11/bin/activate
            export FLASK_APP=app.py
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
            # Run migrations
            python -m flask db upgrade
          else
            echo "Warning: Virtualenv not found at standard path. Please check cPanel Setup Python App."
          fi
          
          # Restart the app (Passenger standard)
          mkdir -p tmp
          touch tmp/restart.txt

